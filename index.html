<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ABOUT THAT VACATION</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-4Q6Gf2aSP4eDXB8Miphtr37CMZZQ5oXLH2yaXMJ2w8e2ZtHTl7GptT4jmndRuHDT"
      crossorigin="anonymous"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
    />
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-j1CDi7MgGQ12Z7Qab0qlWQ/Qqz24Gc6BM0thvEMVjHnfYGF0rmFCozFSxQBxwHKO"
      crossorigin="anonymous"
    ></script>
  </head>
  <body>
    <div
      class="container col-md-8 text-center pt-3 d-flex flex-column justify-content-center"
    >
      <h1 class="text-success display-3">About That Vacation...</h1>
      <div id="form-container" class="text-bg-success px-3 py-2 rounded">
        <form action="" class="text-start">
          <div class="pt-2">
            <label for="vac-name">Vacation's Name</label>
            <input
              type="text"
              class="form-control"
              id="vac-name"
              name="vac-name"
            />
          </div>
          <div class="pt-2">
            <label for="vac-pict-link">Vacation's photo</label>
            <input
              type="text"
              class="form-control"
              id="vac-pict-link"
              name="vac-pict-link"
            />
          </div>
          <div class="pt-2 d-flex justify-content-between">
            <div>
              <label for="vac-price">price</label>
              <input
                type="number"
                class="form-control"
                id="vac-price"
                name="vac-price"
              />
            </div>
            <div>
              <div><label for="vac-rating">Rate it!</label></div>
              <select name="vac-rating" id="vac-rating">
                <option value=""></option>
                <option value="4">Excellent</option>
                <option value="3">Good</option>
                <option value="2">Regular</option>
                <option value="1">bad</option>
              </select>
            </div>
          </div>
          <div class="text-center">
            <button
              type="button"
              id="card-maker"
              class="btn btn-warning my-2 py-2"
            >
              Create a vacation card
            </button>
          </div>
        </form>
      </div>
      <div id="cards-container" class="row d-flex justify-content-center">
    </div>
    <script src="./task01.js"></script>
  </body>
</html>
